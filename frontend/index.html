<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <h1 id="appTitle">weekly planner</h1>
    <span class="hint" id="appHint">drag to reorder · dbl-click = done · right-click label = edit</span>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="lang-btn" id="langBtn" title="Switch language">EN</button>
    <div class="scale-btns" id="scaleBtns"></div>
    <button class="add-day-btn" id="addUnscheduledBtn" style="display:none">+ unscheduled</button>
    <button class="add-day-btn" id="addDayBtn">+ add day</button>
    <div class="add-day-form" id="addDayForm">
      <input type="text" id="newDayLabel" placeholder="Mon" maxlength="12" />
      <input type="text" id="newDayDate" class="date-in" placeholder="04/28" maxlength="10" />
      <button id="addDayConfirm">add</button>
      <button id="addDayCancel">cancel</button>
    </div>
  </div>
</header>

<div class="legend" id="legend"></div>
<div class="board" id="board"></div>

<script src="collapse.js"></script>
<script src="constants.js"></script>
<script src="i18n.js"></script>
<script src="state.js"></script>
<script src="labels.js"></script>
<script src="tasks.js"></script>
<script src="columns.js"></script>
<script src="scale.js"></script>
<script src="add-label-panel.js"></script>
<script src="context-menu.js"></script>
<script src="legend.js"></script>
<script src="board.js"></script>
<script src="app.js"></script>
</body>
</html>
