<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap"></noscript>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <h1 id="appTitle">weekly planner</h1>
    <span class="hint" id="appHint">drag to reorder · dbl-click = done · right-click label = edit</span>
  </div>
  <div role="toolbar" style="display:flex;align-items:center;gap:8px">
    <button class="lang-btn" id="langBtn" title="Switch language" aria-label="Switch language">EN</button>
    <div class="scale-btns" id="scaleBtns"></div>
    <button class="add-day-btn" id="addUnscheduledBtn" style="display:none">+ unscheduled</button>
    <button class="add-day-btn" id="addDayBtn">+ add day</button>
    <div class="add-day-form" id="addDayForm">
      <input type="text" id="newDayLabel" placeholder="Mon" maxlength="12" />
      <input type="text" id="newDayDate" class="date-in" placeholder="04/28" maxlength="10" />
      <button id="addDayConfirm">add</button>
      <button id="addDayCancel">cancel</button>
    </div>
  </div>
</header>

<div class="legend" id="legend"></div>
<div class="board" id="board"></div>

<script defer src="collapse.js"></script>
<script defer src="constants.js"></script>
<script defer src="i18n.js"></script>
<script defer src="state.js"></script>
<script defer src="undo.js"></script>
<script defer src="labels.js"></script>
<script defer src="tasks.js"></script>
<script defer src="columns.js"></script>
<script defer src="scale.js"></script>
<script defer src="add-label-panel.js"></script>
<script defer src="context-menu.js"></script>
<script defer src="legend.js"></script>
<script defer src="board.js"></script>
<script defer src="app.js"></script>
</body>
</html>
